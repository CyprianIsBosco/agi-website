<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGI Admin — Orders Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
.admin-body { padding: 8rem 5% 4rem; min-height: 100vh; }
.admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem; }
.admin-header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 3rem; }
.stat-card { background: var(--navy2); border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem; }
.stat-card .s-label { font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
.stat-card .s-val { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: var(--neon); line-height: 1; }
.login-box { max-width: 400px; margin: 4rem auto; background: var(--navy2); border: 1px solid var(--border); border-radius: 8px; padding: 2.5rem; }
.login-box h2 { font-family: 'Syne', sans-serif; font-weight: 800; margin-bottom: 1.5rem; }
.orders-table { width: 100%; border-collapse: collapse; }
.orders-table th { font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: .8rem 1rem; text-align: left; border-bottom: 1px solid var(--border); }
.orders-table td { padding: 1rem; border-bottom: 1px solid rgba(0,245,200,.06); font-size: .88rem; vertical-align: middle; }
.orders-table tr:hover td { background: var(--navy3); }
.status-badge { display: inline-block; font-size: .68rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 10px; border-radius: 2px; }
.status-pending  { background: rgba(186,117,23,.15); color: #EF9F27; }
.status-paid     { background: rgba(29,158,117,.15); color: #00f5c8; }
.status-in_progress { background: rgba(123,95,255,.15); color: #7b5fff; }
.status-completed { background: rgba(0,245,200,.15); color: #00f5c8; }
.pkg-badge { font-size: .7rem; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; background: rgba(0,245,200,.08); color: var(--neon); }
.empty-state { text-align: center; padding: 4rem; color: var(--muted); }
.refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: .5rem 1.2rem; border-radius: 2px; font-family: 'Syne', sans-serif; font-size: .8rem; letter-spacing: 1px; cursor: pointer; transition: border-color .3s, color .3s; }
.refresh-btn:hover { border-color: var(--neon); color: var(--neon); }
.table-wrap { overflow-x: auto; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav id="navbar">
  <a href="../index.html" class="logo">AGI<span>.</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">← Main Site</a></li>
  </ul>
</nav>

<div class="admin-body">

  <!-- LOGIN -->
  <div id="loginView">
    <div class="login-box">
      <div class="section-label">Admin Access</div>
      <h2>Orders Dashboard</h2>
      <div class="form-group" style="margin-bottom:1.2rem;">
        <label>Admin Key</label>
        <input type="password" id="adminKeyInput" placeholder="Enter your admin key"/>
      </div>
      <button class="submit-btn" id="loginBtn" style="width:100%;text-align:center;">Access Dashboard</button>
      <p style="color:var(--muted);font-size:.8rem;margin-top:1rem;text-align:center;">Your admin key is in the backend .env file</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashView" style="display:none;">
    <div class="admin-header">
      <div>
        <div class="section-label">Admin Panel</div>
        <h1>Orders Dashboard</h1>
      </div>
      <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="s-label">Total Orders</div><div class="s-val" id="statTotal">—</div></div>
      <div class="stat-card"><div class="s-label">Paid</div><div class="s-val" id="statPaid">—</div></div>
      <div class="stat-card"><div class="s-label">Pending</div><div class="s-val" id="statPending">—</div></div>
      <div class="stat-card"><div class="s-label">Revenue</div><div class="s-val" id="statRevenue">—</div></div>
    </div>

    <div class="table-wrap">
      <table class="orders-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>Company</th>
            <th>Package</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="7" class="empty-state">Loading orders...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="../js/main.js"></script>
<script>
let adminKey = '';
const API = 'https://agi-backend-8cdh.onrender.com';

document.getElementById('loginBtn').addEventListener('click', () => {
  adminKey = document.getElementById('adminKeyInput').value;
  if (!adminKey) return;
  loadOrders();
});
document.getElementById('adminKeyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('refreshBtn').addEventListener('click', loadOrders);

async function loadOrders() {
  try {
    const res = await fetch(`${API}/api/admin/orders`, {
      headers: { 'x-admin-key': adminKey }
    });
    if (res.status === 401) { alert('Invalid admin key'); return; }
    const orders = await res.json();
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
    renderStats(orders);
    renderTable(orders);
  } catch {
    alert('Cannot connect to backend. Please try again in a moment.');
  }
}

function renderStats(orders) {
  const paid = orders.filter(o => o.status === 'paid' || o.status === 'completed');
  const revenue = paid.reduce((sum, o) => sum + (o.amount || 0), 0);
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statPaid').textContent = paid.length;
  document.getElementById('statPending').textContent = orders.filter(o => o.status === 'pending').length;
  document.getElementById('statRevenue').textContent = '$' + revenue.toLocaleString();
}

function renderTable(orders) {
  const tbody = document.getElementById('ordersBody');
  if (!orders.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No orders yet. Share your site to get your first client!</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td style="color:var(--muted);font-size:.8rem;">${new Date(o.createdAt).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })}</td>
      <td style="font-weight:500;">${o.name}</td>
      <td style="color:var(--muted);">${o.company}</td>
      <td><span class="pkg-badge">${o.package}</span></td>
      <td style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--neon);">$${(o.amount||0).toLocaleString()}</td>
      <td><span class="status-badge status-${o.status}">${o.status.replace('_',' ')}</span></td>
      <td style="color:var(--muted);font-size:.82rem;">${o.email}</td>
    </tr>
  `).join('');
}
</script>
</body>
</html>
